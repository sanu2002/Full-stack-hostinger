services:
  server:
    build: ./server
    container_name: express-server
    ports:
      - "4000:4000"
    environment:
      # Frontend origin(s) allowed to call this API (comma-separated).
      # Value comes from the .env file next to this docker-compose.yml.
      - CLIENT_URL=${CLIENT_URL}
    networks:
      - fullstack-net
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        # Public URL of the API, baked into the frontend at BUILD time.
        # Vite only exposes env vars during build, so this must be an ARG.
        VITE_API_URL: ${SERVER_URL}
    container_name: react-client
    ports:
      - "3000:3000"
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge
